<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Content Guardian</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 15px;
      width: 320px;
      color: #333;
    }
    
    .header {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
    }
    
    .logo {
      font-size: 24px;
      margin-right: 10px;
      color: #20639B;
      font-weight: bold;
    }
    
    h1 {
      font-size: 16px;
      margin: 0;
    }
    
    .safe-status {
      display: flex;
      align-items: center;
      margin: 20px 0;
      padding: 15px;
      border-radius: 6px;
    }
    
    .safe {
      background-color: #e7f7ed;
      border: 1px solid #c3e6cb;
    }
    
    .unsafe {
      background-color: #f8d7da;
      border: 1px solid #f5c6cb;
    }
    
    .supervised {
      background-color: #e8f5e9;
      border: 1px solid #a5d6a7;
    }
    
    .unknown {
      background-color: #fff3cd;
      border: 1px solid #ffecb5;
    }
    
    .error {
      background-color: #f8d7da;
      border: 1px solid #f5c6cb;
    }
    
    .status-icon {
      font-size: 22px;
      margin-right: 10px;
      font-weight: bold;
      width: 24px;
      text-align: center;
    }
    
    .status-text {
      flex: 1;
    }
    
    .status-title {
      font-weight: bold;
      margin-bottom: 5px;
    }
    
    .footer {
      font-size: 12px;
      color: #777;
      text-align: center;
      margin-top: 20px;
    }
    
    .loading {
      text-align: center;
      padding: 20px;
      color: #666;
    }
    
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(0, 0, 0, 0.1);
      border-radius: 50%;
      border-top-color: #20639B;
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 10px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .retry-button {
      display: inline-block;
      background-color: #20639B;
      color: white;
      padding: 8px 16px;
      border-radius: 4px;
      text-decoration: none;
      margin-top: 10px;
      cursor: pointer;
      border: none;
      font-size: 14px;
    }
    
    .retry-button:hover {
      background-color: #174d7c;
    }
    
    /* Supervised mode styles */
    .supervision-section {
      margin-top: 20px;
      border-top: 1px solid #eee;
      padding-top: 15px;
      display: none; /* Hidden by default, shown when logged in */
    }
    
    .supervision-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    
    .status-label {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
    }
    
    .active {
      background-color: #e8f5e9;
      color: #2e7d32;
    }
    
    .inactive {
      background-color: #f5f5f5;
      color: #757575;
    }
    
    .button {
      padding: 8px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
      transition: background-color 0.2s;
    }
    
    .button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .primary {
      background-color: #4CAF50;
      color: white;
    }
    
    .primary:hover:not(:disabled) {
      background-color: #3e8e41;
    }
    
    .warning {
      background-color: #ff9800;
      color: white;
    }
    
    .warning:hover:not(:disabled) {
      background-color: #e68a00;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">CG</div>
    <h1>Content Guardian</h1>
  </div>
  
  <div id="status-container">
    <!-- This will be filled by JavaScript -->
    <div class="loading">
      <div class="loading-spinner"></div>
      <div>Checking site safety...</div>
    </div>
  </div>
  
  <div id="error-actions" style="text-align: center; display: none;">
    <button id="retry-button" class="retry-button">Retry</button>
  </div>
  
  <div id="supervision-section" class="supervision-section">
    <div class="supervision-header">
      <span id="supervision-status" class="status-label inactive">Supervised Mode Inactive</span>
      <button id="supervised-mode-toggle" class="button primary">Enter Supervised Mode</button>
    </div>
    <p style="font-size: 12px; color: #666; margin-top: 5px;">
      Supervised mode is automatically enabled when you sign in. Use the Exit button to disable it.
    </p>
  </div>
  
  <div class="footer">
    Content Guardian is protecting your browsing experience
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
