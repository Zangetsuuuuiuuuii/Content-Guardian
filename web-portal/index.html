<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Guardian Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            max-width: 500px;
            margin: 100px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            background-color: white;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-text {
            font-size: 32px;
            font-weight: bold;
            color: #20639B;
        }
        .logo-icon {
            font-size: 40px;
            color: #20639B;
            margin-right: 10px;
        }
        .tab-content {
            padding: 20px 0;
        }
        .form-label {
            font-weight: 500;
        }
        .btn-primary {
            background-color: #20639B;
            border-color: #20639B;
            padding: 10px 20px;
        }
        .btn-primary:hover {
            background-color: #174d78;
            border-color: #174d78;
        }
        .signup-link {
            text-align: center;
            margin-top: 20px;
        }
        .nav-tabs .nav-link {
            color: #6c757d;
        }
        .nav-tabs .nav-link.active {
            color: #20639B;
            font-weight: 500;
        }
        .password-wrapper {
            position: relative;
        }
        .password-toggle {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            cursor: pointer;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-container">
            <div class="logo">
                <span class="logo-icon">🛡️</span>
                <span class="logo-text">Content Guardian</span>
            </div>
            
            <ul class="nav nav-tabs" id="loginTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="guardian-tab" data-bs-toggle="tab" data-bs-target="#guardian" type="button" role="tab" aria-controls="guardian" aria-selected="true">Guardian Login</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="user-tab" data-bs-toggle="tab" data-bs-target="#user" type="button" role="tab" aria-controls="user" aria-selected="false">User Login</button>
                </li>
            </ul>
            
            <div class="tab-content" id="loginTabsContent">
                <!-- Guardian Login Form -->
                <div class="tab-pane fade show active" id="guardian" role="tabpanel" aria-labelledby="guardian-tab">
                    <form id="guardianLoginForm">
                        <div class="mb-3">
                            <label for="guardianEmail" class="form-label">Email address</label>
                            <input type="email" class="form-control" id="guardianEmail" required>
                        </div>
                        <div class="mb-3">
                            <label for="guardianPassword" class="form-label">Password</label>
                            <div class="password-wrapper">
                                <input type="password" class="form-control" id="guardianPassword" required>
                                <span class="password-toggle" id="guardianPasswordToggle">
                                    <i class="bi bi-eye"></i>
                                </span>
                            </div>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Login as Guardian</button>
                        </div>
                        <div id="guardianLoginError" class="text-danger mt-2" style="display: none;"></div>
                        <div id="guardianLoginInfo" class="text-info mt-2" style="display: none;"></div>
                    </form>
                    <div class="signup-link">
                        <p>Don't have an account? <a href="register.html">Sign up</a></p>
                    </div>
                </div>
                
                <!-- User Login Form -->
                <div class="tab-pane fade" id="user" role="tabpanel" aria-labelledby="user-tab">
                    <form id="userLoginForm">
                        <div class="mb-3">
                            <label for="userEmail" class="form-label">Email address</label>
                            <input type="email" class="form-control" id="userEmail" required>
                        </div>
                        <div class="mb-3">
                            <label for="userPassword" class="form-label">Password</label>
                            <div class="password-wrapper">
                                <input type="password" class="form-control" id="userPassword" required>
                                <span class="password-toggle" id="userPasswordToggle">
                                    <i class="bi bi-eye"></i>
                                </span>
                            </div>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Login as User</button>
                        </div>
                        <div id="userLoginError" class="text-danger mt-2" style="display: none;"></div>
                        <div id="userLoginInfo" class="text-info mt-2" style="display: none;"></div>
                    </form>
                    <div class="signup-link">
                        <p>Don't have an account? <a href="register.html">Sign up</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE_URL = '/api';
        const API_ENDPOINTS = {
            LOGIN: `${API_BASE_URL}/login`,
            USER_INFO: `${API_BASE_URL}/users/me`
        };

        document.addEventListener('DOMContentLoaded', function() {
            // Add event listeners
            document.getElementById('guardianLoginForm').addEventListener('submit', e => {
                e.preventDefault();
                handleLogin('guardian');
            });

            document.getElementById('userLoginForm').addEventListener('submit', e => {
                e.preventDefault();
                handleLogin('user');
            });
            
            document.getElementById('guardianPasswordToggle').addEventListener('click', () => 
                togglePasswordVisibility('guardianPassword', 'guardianPasswordToggle'));
                
            document.getElementById('userPasswordToggle').addEventListener('click', () => 
                togglePasswordVisibility('userPassword', 'userPasswordToggle'));
                
            // Check if already logged in
            const authData = JSON.parse(localStorage.getItem('contentGuardianAuth') || '{}');
            if (authData.isLoggedIn && authData.userInfo) {
                redirectToDashboard(authData.userInfo.role);
            }
        });

        function togglePasswordVisibility(passwordId, toggleId) {
            const passwordInput = document.getElementById(passwordId);
            const icon = document.querySelector(`#${toggleId} i`);
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        }

        async function handleLogin(role) {
            const emailField = document.getElementById(`${role}Email`);
            const passwordField = document.getElementById(`${role}Password`);
            const errorElement = document.getElementById(`${role}LoginError`);
            const infoElement = document.getElementById(`${role}LoginInfo`);
            
            // Reset messages
            errorElement.style.display = 'none';
            infoElement.style.display = 'none';
            
            // Show processing message
            infoElement.textContent = 'Logging in...';
            infoElement.style.display = 'block';
            
            try {
                // Login via API
                const loginData = {
                    email: emailField.value,
                    password: passwordField.value
                };
                
                // For demo purposes, simulate successful login
                // In a real application, this would make an API call
                
                // Simulate API latency
                await new Promise(resolve => setTimeout(resolve, 800));
                
                // Check localStorage as fallback
                const localUsers = JSON.parse(localStorage.getItem('contentGuardianUsers') || '[]');
                const user = localUsers.find(u => 
                    u.email === emailField.value && 
                    u.password === passwordField.value
                );
                
                if (!user) {
                    throw new Error('Invalid email or password');
                }
                
                // Check if the user's role matches the login tab
                if (user.role && user.role !== role) {
                    // Show a warning but proceed with login
                    console.warn(`User role (${user.role}) doesn't match login tab (${role})`);
                }
                
                // Use the user's actual role from database
                const actualRole = user.role || role;
                
                // Successful login
                const authData = {
                    token: 'demo-token-' + Math.random().toString(36).substring(2),
                    refreshToken: 'demo-refresh-' + Math.random().toString(36).substring(2),
                    userId: Math.floor(Math.random() * 10000),
                    isLoggedIn: true,
                    userInfo: {
                        full_name: user.full_name,
                        email: user.email,
                        role: actualRole,
                        verification_emails: user.verification_emails || [user.email]
                    }
                };
                
                localStorage.setItem('contentGuardianAuth', JSON.stringify(authData));
                
                // Automatically enable supervised mode
                localStorage.setItem('contentGuardianSupervision', 'active');
                
                // Create supervision session data
                const supervisionData = {
                    active: true,
                    startTime: new Date().toISOString(),
                    expiryTime: new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString(), // 24 hours by default
                    supervisor: actualRole === 'guardian' ? user.email : null,
                    supervisedUser: actualRole === 'user' ? user.email : null
                };
                
                localStorage.setItem('contentGuardianSupervisionData', JSON.stringify(supervisionData));
                
                // Set global supervised mode variable if available
                if (typeof window.supervised_mode !== 'undefined') {
                    window.supervised_mode = true;
                }
                
                infoElement.textContent = 'Login successful! Entering supervised mode...';
                
                // Redirect to appropriate dashboard based on actual role
                setTimeout(() => {
                    redirectToDashboard(actualRole);
                }, 1000);
                
            } catch (error) {
                console.error('Login error:', error);
                infoElement.style.display = 'none';
                errorElement.textContent = error.message || 'Invalid email or password';
                errorElement.style.display = 'block';
            }
        }
        
        async function getUserInfo(token) {
            try {
                const response = await fetch(`${API_BASE_URL}/users/me`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (!response.ok) {
                    throw new Error('Failed to get user info');
                }
                
                return await response.json();
            } catch (error) {
                console.error('Failed to get user info:', error);
                return null;
            }
        }
        
        function redirectToDashboard(role) {
            if (role === 'guardian') {
                window.location.href = 'guardian-dashboard.html';
            } else {
                window.location.href = 'user-dashboard.html';
            }
        }
    </script>
</body>
</html>
